<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pendaftaran SPMB 2026</title>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        :root {
            --primary: #2563eb;
            --primary-hover: #1d4ed8;
            --bg-color: #f3f4f6;
            --text-dark: #1f2937;
            --text-muted: #6b7280;
            --white: #ffffff;
            --border: #e5e7eb;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', system-ui, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .card {
            background: var(--white);
            width: 100%;
            max-width: 420px;
            padding: 32px;
            border-radius: 16px;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1), 0 8px 10px -6px rgba(0, 0, 0, 0.1);
        }

        .header {
            text-align: center;
            margin-bottom: 24px;
        }

        .header h2 {
            color: var(--text-dark);
            font-size: 24px;
            margin-bottom: 8px;
        }

        .header p {
            color: var(--text-muted);
            font-size: 14px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 6px;
            color: var(--text-dark);
            font-size: 14px;
            font-weight: 500;
        }

        .form-control {
            width: 100%;
            padding: 12px 16px;
            border: 1px solid var(--border);
            border-radius: 8px;
            font-size: 15px;
            transition: all 0.3s ease;
            background-color: #f9fafb;
        }

        .form-control:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.2);
            background-color: var(--white);
        }

        .btn-submit {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, var(--primary), #3b82f6);
            color: var(--white);
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
        }

        .btn-submit:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(37, 99, 235, 0.3);
        }

        .btn-submit:disabled {
            background: #93c5fd;
            cursor: not-allowed;
            transform: none;
        }

        /* Spinner Animation */
        .spinner {
            display: none;
            width: 20px;
            height: 20px;
            border: 3px solid rgba(255,255,255,0.3);
            border-radius: 50%;
            border-top-color: var(--white);
            animation: spin 1s ease-in-out infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>

    <div class="card">
        <div class="header">
            <h2>Pendaftaran SPMB</h2>
            <p>Silakan lengkapi data diri Anda di bawah ini</p>
        </div>

        <form id="spmbForm">
            <div class="form-group">
                <label for="nama">Nama Lengkap</label>
                <input type="text" id="nama" class="form-control" placeholder="Masukkan nama lengkap" required>
            </div>
            
            <div class="form-group">
                <label for="noHp">Nomor WhatsApp</label>
                <input type="tel" id="noHp" class="form-control" placeholder="Contoh: 08123456789" required>
            </div>

            <button type="submit" id="btnSubmit" class="btn-submit">
                <span class="spinner" id="spinner"></span>
                <span id="btnText">Daftar Sekarang</span>
            </button>
        </form>
    </div>

    <script>
        const GAS_URL = "https://script.google.com/macros/s/AKfycbxG_cdMwGHa72iJx2z_bqcHcN1JsffLRwWChEKiuUSbj5CpWhcXTnr85mFD2hGIUkkKNw/exec";

        const form = document.getElementById('spmbForm');
        const btnSubmit = document.getElementById('btnSubmit');
        const spinner = document.getElementById('spinner');
        const btnText = document.getElementById('btnText');

        form.addEventListener('submit', async (e) => {
            e.preventDefault();

            const nama = document.getElementById('nama').value.trim();
            const noHp = document.getElementById('noHp').value.trim();

            if (!nama || !noHp) {
                Swal.fire({
                    icon: 'error',
                    title: 'Oops...',
                    text: 'Nama dan Nomor WhatsApp wajib diisi!',
                    confirmButtonColor: '#2563eb'
                });
                return;
            }

            btnSubmit.disabled = true;
            spinner.style.display = 'inline-block';
            btnText.textContent = 'Mengirim data...';

            try {
                const response = await fetch(GAS_URL, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'text/plain;charset=utf-8',
                    },
                    body: JSON.stringify({ nama: nama, noHp: noHp })
                });

                const result = await response.json();

                if (result.status === 'success') {
                    form.reset();
                    
                    // --- PERUBAHAN UTAMA ADA DI SINI ---
                    Swal.fire({
                        icon: 'success',
                        title: 'Pendaftaran Berhasil!',
                        html: `No Pendaftaran: <b>${result.noDaftar}</b><br><br>Cek WhatsApp Anda untuk konfirmasi 📲`,
                        confirmButtonColor: '#2563eb',
                        confirmButtonText: 'Lanjut ke Menu Berikutnya ➡️',
                        allowOutsideClick: false // Mencegah user menutup popup dengan klik di luar
                    }).then((alertResult) => {
                        // Jika tombol "Lanjut" diklik
                        if (alertResult.isConfirmed) {
                            
                            // GANTI URL INI dengan URL menu selanjutnya Anda
                            // Contoh: upload-berkas.html, dashboard.html, dll.
                            const urlMenuSelanjutnya = "dashboard.html"; 
                            
                            // Redirect sambil membawa parameter No Pendaftaran
                            window.location.href = `${urlMenuSelanjutnya}?noDaftar=${result.noDaftar}`;
                        }
                    });
                    // -----------------------------------

                } else {
                    throw new Error(result.message);
                }

            } catch (error) {
                Swal.fire({
                    icon: 'error',
                    title: 'Gagal Tersimpan',
                    text: 'Terjadi kesalahan sistem: ' + error.message,
                    confirmButtonColor: '#2563eb'
                });
            } finally {
                btnSubmit.disabled = false;
                spinner.style.display = 'none';
                btnText.textContent = 'Daftar Sekarang';
            }
        });
    </script>
</body>
</html>
